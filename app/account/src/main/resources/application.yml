spring:
  application:
    name: account

  datasource:
    url: jdbc:h2:mem:accountdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

# Eureka Client 설정 - blue-bank-gateway 프로젝트에서 관리
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
    enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Feign Client 설정
feign:
  account:
    url: http://localhost:8080  # Account 서비스 URL
  client:
    config:
      default:
        connectTimeout: 5000      # 연결 타임아웃 (ms)
        readTimeout: 10000        # 읽기 타임아웃 (ms)
        loggerLevel: basic        # 로깅 레벨
      account-service:
        connectTimeout: 3000
        readTimeout: 5000

# Logging 설정
logging:
  level:
    com.socoolheeya.bluebank.account.adapter: DEBUG  # Feign Client 로깅
