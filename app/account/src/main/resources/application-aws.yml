# AWS 환경용 설정 (프로덕션)
spring:
  profiles: aws

eureka:
  instance:
    # AWS 메타데이터 사용
    metadata-map:
      zone: ${AWS_ZONE:us-east-1a}  # 실제 AWS AZ
      ami-id: ${AWS_AMI_ID:ami-12345678}  # EC2 AMI ID
      instance-type: ${AWS_INSTANCE_TYPE:t2.micro}

    # AWS 환경에서의 인스턴스 설정
    hostname: ${EC2_HOSTNAME:localhost}
    ip-address: ${EC2_IP_ADDRESS:127.0.0.1}
    prefer-ip-address: true

    # AWS 데이터센터 설정
    datacenter: Amazon
    environment: production

  client:
    # AWS에서 여러 AZ에 걸친 Eureka 서버들
    service-url:
      us-east-1a: http://eureka-1a.example.com:8761/eureka/
      us-east-1b: http://eureka-1b.example.com:8761/eureka/
      us-east-1c: http://eureka-1c.example.com:8761/eureka/

    # 가용 영역 설정
    availability-zones:
      us-east-1: us-east-1a,us-east-1b,us-east-1c

    region: us-east-1
    prefer-same-zone-eureka: true  # 같은 AZ의 Eureka 서버 우선 사용