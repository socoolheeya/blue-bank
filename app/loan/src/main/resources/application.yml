spring:
  application:
    name: loan

  datasource:
    url: jdbc:h2:mem:loandb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082


# Feign Client 설정
feign:
  account:
    url: ${FEIGN_ACCOUNT_URL:http://localhost:8081}
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      account-service:
        connectTimeout: 3000
        readTimeout: 5000

# Logging 설정
logging:
  level:
    com.socoolheeya.bluebank.loan: DEBUG
    com.socoolheeya.bluebank.loan.client: DEBUG