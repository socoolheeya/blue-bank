version: '3.8'

services:
  # Account Service
  account-service:
    build: ./app/account
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:accountdb
    networks:
      - bluebank-network

  # Deposit Service
  deposit-service:
    build: ./app/deposit
    container_name: deposit-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:depositdb
      - FEIGN_ACCOUNT_URL=http://account-service:8081
    depends_on:
      - account-service
    networks:
      - bluebank-network

  # Loan Service
  loan-service:
    build: ./app/loan
    container_name: loan-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=loan
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:loandb
      - FEIGN_ACCOUNT_URL=http://account-service:8081
    depends_on:
      - account-service
    networks:
      - bluebank-network

  # Card Service
  card-service:
    build: ./app/card
    container_name: card-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=card
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:carddb
      - FEIGN_ACCOUNT_URL=http://account-service:8081
    depends_on:
      - account-service
    networks:
      - bluebank-network

networks:
  bluebank-network:
    driver: bridge