version: '3.8'

services:
  # Eureka Server
  eureka-server:
    build: ./infra/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - bluebank-network

  # API Gateway (로드밸런서 역할)
  api-gateway:
    build: ./infra/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - bluebank-network

  # Account Service (Scale 가능)
  account-service:
    build: ./app/account
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=account
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:accountdb
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - EUREKA_INSTANCE_METADATA_MAP_ZONE=zone-a
      - EUREKA_INSTANCE_METADATA_MAP_DATACENTER=Docker
      - EUREKA_INSTANCE_METADATA_MAP_ENVIRONMENT=development
    depends_on:
      - eureka-server
    networks:
      - bluebank-network

  # Deposit Service (Scale 가능)
  deposit-service:
    build: ./app/deposit
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=deposit
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:depositdb
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - EUREKA_INSTANCE_METADATA_MAP_ZONE=zone-b
      - EUREKA_INSTANCE_METADATA_MAP_DATACENTER=Docker
      - EUREKA_INSTANCE_METADATA_MAP_ENVIRONMENT=development
    depends_on:
      - eureka-server
      - account-service
    networks:
      - bluebank-network

  # Loan Service (Scale 가능)
  loan-service:
    build: ./app/loan
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=loan
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:loandb
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - EUREKA_INSTANCE_METADATA_MAP_ZONE=zone-c
      - EUREKA_INSTANCE_METADATA_MAP_DATACENTER=Docker
      - EUREKA_INSTANCE_METADATA_MAP_ENVIRONMENT=development
    depends_on:
      - eureka-server
      - account-service
    networks:
      - bluebank-network

  # Card Service (Scale 가능)
  card-service:
    build: ./app/card
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=card
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:carddb
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - EUREKA_INSTANCE_METADATA_MAP_ZONE=zone-a
      - EUREKA_INSTANCE_METADATA_MAP_DATACENTER=Docker
      - EUREKA_INSTANCE_METADATA_MAP_ENVIRONMENT=development
    depends_on:
      - eureka-server
      - account-service
    networks:
      - bluebank-network

networks:
  bluebank-network:
    driver: bridge