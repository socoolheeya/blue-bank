apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-bank-account
  namespace: blue-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue-bank-account
  template:
    metadata:
      labels:
        app: blue-bank-account
    spec:
      imagePullSecrets:
        - name: ncr-registry
      containers:
        - name: account
          image: blue-bank-dev.kr.ncr.ntruss.com/account:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8100
          env:
            - name: SERVER_PORT
              value: "8100"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20