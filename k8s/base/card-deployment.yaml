apiVersion: apps/v1
kind: Deployment
metadata:
  name: card
  namespace: blue-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card
  template:
    metadata:
      labels:
        app: card
    spec:
      imagePullSecrets:
        - name: ncr-registry
      containers:
        - name: card
          image: blue-bank-dev.kr.ncr.ntruss.com/card:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8400
          env:
            - name: SERVER_PORT
              value: "8400"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20