name: Build and publish NCR images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "data/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradlew"
      - "infra/docker/**"
      - ".dockerignore"

concurrency:
  group: ncr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check --no-daemon --console=plain

  publish:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [account, loan, card, deposit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:${{ matrix.service }}:bootJar --no-daemon --console=plain
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NCR_REGISTRY }}
          username: ${{ secrets.NCP_ACCESS_KEY }}
          password: ${{ secrets.NCP_SECRET_KEY }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          build-args: JAR_FILE=app/${{ matrix.service }}/build/libs/${{ matrix.service }}-0.0.1-SNAPSHOT.jar
          push: true
          tags: ${{ secrets.NCR_REGISTRY }}/blue-bank-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
