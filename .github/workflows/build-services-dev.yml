name: Build and Push Dev Services

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "data/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "k8s/**"
      - ".github/workflows/build-services-dev.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - account
          - deposit
          - loan
          - card

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to NCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NCR_ENDPOINT }}
          username: ${{ secrets.NCLOUD_ACCESS_KEY }}
          password: ${{ secrets.NCLOUD_SECRET_KEY }}

      - name: Build service
        run: ./gradlew :app:${{ matrix.service }}:bootJar

      - name: Build and push image
        env:
          NCR_ENDPOINT: ${{ secrets.NCR_ENDPOINT }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f "app/${{ matrix.service }}/Dockerfile" \
            -t "$NCR_ENDPOINT/${{ matrix.service }}:dev-${GITHUB_SHA}" \
            -t "$NCR_ENDPOINT/${{ matrix.service }}:latest" \
            --push \
            "app/${{ matrix.service }}"
  update-manifest:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
  
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
  
      - name: Update all dev image tags
        run: |
          sed -i "s/newTag: .*/newTag: dev-${GITHUB_SHA}/g" \
            k8s/overlays/dev/kustomization.yaml
  
      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
  
          git add k8s/overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
              exit 0
          fi

          git commit -m "deploy: update dev service images"
          git pull --rebase origin main
          git push origin HEAD:main
