apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blue-bank-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: blue-bank
  source:
    repoURL: https://github.com/socoolheeya/blue-bank.git
    targetRevision: testballoon
    path: deploy/helm/blue-bank
    helm:
      releaseName: blue-bank
      valueFiles:
        - values-local.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: blue-bank
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
