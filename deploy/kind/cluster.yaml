kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: blue-bank
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30081
        hostPort: 18081
        protocol: TCP
