spring:
  datasource:
    url: jdbc:h2:mem:account-integration;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  main:
    banner-mode: off
logging:
  level:
    root: WARN
